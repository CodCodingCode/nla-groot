name: steerability_v1
output_dir: data/eval/steerability_v1
model_path: checkpoints/GR00T-N1.7-LIBERO/libero_goal
embodiment_tag: LIBERO_PANDA

envs:
  - libero_sim/put_the_bowl_on_the_plate

seeds: [0, 1, 2, 3, 4]
n_action_steps: 8
max_episode_steps: 300
suppress_done: true
steps_per_render: 1
fps: 20

policy_host: 0.0.0.0
policy_port: 5555

# Bodies tracked per sim step for the metrics (matches MuJoCo body names).
tracked_bodies:
  - akita_black_bowl_1_main
  - plate_1_main
  - wine_bottle_1_main
  - cream_cheese_1_main
  - wooden_cabinet_1_main
  - flat_stove_1_main
  - wine_rack_1_main

# One entry per row of the comparison table. ar_dir + steer together define a
# steered condition; both null = unsteered baseline.
conditions:
  - name: baseline
    ar_dir: null
    steer: null
    target_body: akita_black_bowl_1_main   # the *original* task target

  - name: steer_bowl_plate
    ar_dir: data/sft/libero_goal_pilot/ar
    steer:
      prompt_file: src/nla/eval/steerability/prompts/bowl_plate.txt
      placement: image_patch_all
      blend: 1.0
    target_body: akita_black_bowl_1_main

  - name: steer_wine_rack
    ar_dir: data/sft/libero_goal_pilot/ar
    steer:
      prompt_file: src/nla/eval/steerability/prompts/wine_rack.txt
      placement: image_patch_all
      blend: 1.0
    target_body: wine_bottle_1_main

  - name: steer_bowl_stove
    ar_dir: data/sft/libero_goal_pilot/ar
    steer:
      prompt_file: src/nla/eval/steerability/prompts/bowl_stove.txt
      placement: image_patch_all
      blend: 1.0
    target_body: akita_black_bowl_1_main   # bowl is still the moved object

# AV-side text-fidelity sub-eval. Reuses scripts/eval/llm_judge_av_captions.py.
av_eval:
  enabled: true
  ar_dirs:
    - data/sft/libero_goal_pilot/ar
  activations_root: data/activations/libero_goal_pilot
  labels_jsonl: data/labels/libero_goal_pilot/labels.jsonl
  frames_cache: data/labels/libero_goal_pilot/frames_cache
  video_keys: [image, wrist_image]
  per_position: 4
  held_out_fraction: 0.1
  split_by: episode
